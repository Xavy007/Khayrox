<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- Cyberpunk cyan dropshadow for the neon glow effect -->
    <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="1.2" flood-color="#00d4ff" flood-opacity="0.9" />
      <feDropShadow dx="0" dy="0" stdDeviation="2.5" flood-color="#00d4ff" flood-opacity="0.5" />
    </filter>
  </defs>
  <!-- Vector representation of the glowing overlapping bands -->
  <g filter="url(#neon-glow)" stroke="#00d4ff" stroke-linecap="round" fill="none">
    <!-- Diagonal 1: Main Line -->
    <line x1="7" y1="7" x2="25" y2="25" stroke-width="2.2" />
    <!-- Diagonal 1: Beaded/Glowing side nodes -->
    <line x1="5" y1="9" x2="23" y2="27" stroke-width="1.2" stroke-dasharray="1 3.5" opacity="0.8" />
    <line x1="9" y1="5" x2="27" y2="23" stroke-width="1.2" stroke-dasharray="1 3.5" opacity="0.8" />
    
    <!-- Diagonal 2: Main Line -->
    <line x1="25" y1="7" x2="7" y2="25" stroke-width="2.2" />
    <!-- Diagonal 2: Beaded/Glowing side nodes -->
    <line x1="27" y1="9" x2="9" y2="27" stroke-width="1.2" stroke-dasharray="1 3.5" opacity="0.8" />
    <line x1="23" y1="5" x2="5" y2="23" stroke-width="1.2" stroke-dasharray="1 3.5" opacity="0.8" />
  </g>
</svg>
